<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cuenta Bancaria</title>
</head>

<body>

  <section id="body">
    <h2>Cuenta Bancaria</h2>
    <button id="body_btNuevoMovimiento">Nuevo Movimiento</button>
    <hr>
    <table border="1" style="border-collapse: collapse;">
      <thead>
        <tr>
          <th>Descripción</th>
          <th>Tipo</th>
          <th>Monto ($)</th>
          <th>Saldo Acumulado ($)</th>
        </tr>
      </thead>
      <tbody id="body_Movimientos"></tbody>
    </table>
    <hr>
    <div>
      Cantidad de movimientos procesados: <span id="body_lblCntMovimientos">0</span>
    </div>
    <div>
      Monto del último movimiento: <span id="body_lblMontoUltimoMovimiento">0.00</span>
    </div>
    <div>
      Descripciones con monto mayor que el último movimiento: <span id="body_lblDescMayorQueUltimo"></span>
    </div>
    <div>Procesos utlizados: forEach, length, push</div>
  </section>

  <section id="movimiento" hidden style="margin-top: 20px; border: 1px solid #ccc; padding: 15px; width: 300px;">
    <h5>Registrar Movimiento</h5>
    <div>
      <label>Descripción:
        <input type="text" id="movimiento_inDescripcion" placeholder="Ej: Desayuno">
      </label>
    </div>
    <div>
      <label>Tipo:
        <select id="movimiento_inTipo">
          <option value="cargo">Cargo (gasto)</option>
          <option value="abono">Abono (ingreso)</option>
        </select>
      </label>
    </div>
    <div>
      <label>Monto ($):
        <input type="number" id="movimiento_inMonto" placeholder="0.00">
      </label>
    </div>
    <br>
    <button id="movimiento_btCancelar">Cancelar</button>
    <button id="movimiento_btAceptar">Aceptar</button>
  </section>

  <script type="module">
    import Cl_cCuenta from "./dist/controllers/Cl_cCuenta.js";
    import Cl_cMovimiento from "./dist/controllers/Cl_cMovimiento.js";
    import Cl_vCuenta from "./dist/views/Cl_vCuenta.js";
    import Cl_vMovimiento from "./dist/views/Cl_vMovimiento.js";

    const vistaCuenta = new Cl_vCuenta();
    const vistaMovimiento = new Cl_vMovimiento();

    const controladorMovimiento = new Cl_cMovimiento(vistaMovimiento);
    new Cl_cCuenta(vistaCuenta, controladorMovimiento);
  </script>
</body>

</html>
